name: loveable
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+2

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # LiveKit SDK for real-time voice
  livekit_client: ^2.6.1

  # HTTP
  http: ^1.2.0

  # Permissions
  permission_handler: ^12.0.1

  # UI / Animations
  confetti: ^0.8.0
  animate_do: ^4.2.0

  # Audio
  audio_session: ^0.2.2
  record: ^6.1.2
  flutter_ringtone_player: ^4.0.0
  sound_mode: ^3.1.1

  # Sensors
  proximity_sensor: ^1.2.5
  sensors_plus: ^4.0.2
  headphones_detection: ^1.1.2
  vibration: 3.1.5

  # Firebase
  firebase_core: ^4.0.0
  firebase_auth: ^6.0.0
  cloud_firestore: ^6.0.0
  firebase_messaging: ^16.1.3

  # Notifications
  flutter_local_notifications: ^18.0.1

  # Media
  image_picker: ^1.1.1
  camera: ^0.10.5

  # Storage / Prefs
  shared_preferences: ^2.5.4
  path_provider: ^2.1.5

  # Sharing
  share_plus: ^12.0.1

  # Speech
  speech_to_text: ^7.3.0

  # Other
  url_launcher: ^6.3.2
  intl: ^0.19.0
  optimize_battery: ^0.0.4
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/sympylogo.png"
  min_sdk_android: 21